apiVersion: apps/v1
kind: Deployment

metadata:
  name: analytics-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: analytics-service

  template:
    metadata:
      labels:
        app: analytics-service

    spec:
      containers:
        - name: analytics-service
          image: kubeshort-analytics-service:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 5001

          env:
            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MONGO_URI